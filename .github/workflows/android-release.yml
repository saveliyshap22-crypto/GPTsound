name: Android CI and prerelease

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Test, lint and build
        run: gradle --no-daemon testDebugUnitTest lintDebug assembleDebug

      - name: Name APK
        run: cp app/build/outputs/apk/debug/app-debug.apk GPTsound-v0.1.0-alpha.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GPTsound-v0.1.0-alpha
          path: GPTsound-v0.1.0-alpha.apk
          if-no-files-found: error

      - name: Publish GitHub prerelease
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-alpha
          name: GPTsound 0.1.0 alpha
          prerelease: true
          generate_release_notes: true
          body: |
            Первый проверяемый Android prerelease GPTsound.

            - Устанавливаемый debug-signed APK для тестирования
            - Glassmorphism UI и настраиваемые JSON-темы
            - SoundCloud OAuth 2.1 PKCE, поиск и related-tracks «Волна»
            - Официальный SoundCloud Widget без обхода рекламы или ограничений

            Для реальных треков укажите собственный SoundCloud Client ID и redirect URI `gptsound://oauth/callback` в настройках приложения.
          files: GPTsound-v0.1.0-alpha.apk
